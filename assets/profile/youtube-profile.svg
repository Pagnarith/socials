<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Grid pattern (Minecraft-inspired) -->
  <g opacity="0.06">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="800" fill="url(#grid)"/>
  </g>

  <!-- Decorative pixels (Minecraft blocks) -->
  <g opacity="0.15">
    <rect x="60" y="60" width="40" height="40" rx="4" fill="#55efc4"/>
    <rect x="120" y="100" width="30" height="30" rx="3" fill="#e94560"/>
    <rect x="680" y="80" width="35" height="35" rx="4" fill="#55efc4"/>
    <rect x="620" y="140" width="25" height="25" rx="3" fill="#e94560"/>
    <rect x="80" y="640" width="30" height="30" rx="3" fill="#e94560"/>
    <rect x="150" y="690" width="25" height="25" rx="3" fill="#55efc4"/>
    <rect x="650" y="660" width="35" height="35" rx="4" fill="#e94560"/>
    <rect x="710" y="620" width="25" height="25" rx="3" fill="#55efc4"/>
  </g>

  <!-- Center circle background -->
  <circle cx="400" cy="320" r="160" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Minecraft pickaxe icon (simplified) -->
  <g transform="translate(340, 240)" filter="url(#glow)">
    <!-- Pickaxe handle -->
    <rect x="50" y="80" width="12" height="80" rx="3" fill="#8B6914" transform="rotate(-45, 56, 120)"/>
    <!-- Pickaxe head -->
    <path d="M30,50 L90,50 L95,30 L85,20 L75,25 L55,25 L45,20 L35,30 Z" fill="url(#accent)"/>
    <!-- Shine on pickaxe -->
    <path d="M45,35 L75,35 L78,28 L72,24 L58,24 L52,28 Z" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- 3D Rhino wireframe icon -->
  <g transform="translate(380, 310)" opacity="0.9" filter="url(#glow)">
    <!-- Simplified 3D cube wireframe -->
    <path d="M0,30 L40,10 L80,30 L40,50 Z" fill="none" stroke="url(#green)" stroke-width="2.5"/>
    <path d="M0,30 L0,60 L40,80 L40,50" fill="none" stroke="url(#green)" stroke-width="2.5"/>
    <path d="M80,30 L80,60 L40,80" fill="none" stroke="url(#green)" stroke-width="2.5"/>
    <!-- Top vertices highlight -->
    <circle cx="40" cy="10" r="3" fill="#55efc4"/>
    <circle cx="0" cy="30" r="3" fill="#55efc4"/>
    <circle cx="80" cy="30" r="3" fill="#55efc4"/>
  </g>

  <!-- Brand name -->
  <text x="400" y="480" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="2">
    iPricky
  </text>
  <text x="400" y="520" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="400" fill="url(#green)" letter-spacing="4">
    PAGNARITH
  </text>

  <!-- Tagline -->
  <text x="400" y="570" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)" letter-spacing="1">
    Minecraft Add-ons &amp; Rhino 3D Tutorials
  </text>

  <!-- YouTube play button -->
  <g transform="translate(360, 610)">
    <rect x="0" y="0" width="80" height="56" rx="12" fill="url(#accent)"/>
    <polygon points="32,12 32,44 58,28" fill="white"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="300" y="700" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
</svg>
