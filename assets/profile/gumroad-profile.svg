<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b8a"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="800" fill="url(#grid)"/>
  </g>

  <!-- Decorative pixels -->
  <g opacity="0.12">
    <rect x="80" y="80" width="35" height="35" rx="4" fill="#55efc4"/>
    <rect x="140" y="120" width="25" height="25" rx="3" fill="#e94560"/>
    <rect x="660" y="100" width="30" height="30" rx="4" fill="#55efc4"/>
    <rect x="600" y="60" width="20" height="20" rx="3" fill="#e94560"/>
    <rect x="70" y="650" width="25" height="25" rx="3" fill="#e94560"/>
    <rect x="130" y="700" width="30" height="30" rx="4" fill="#55efc4"/>
    <rect x="660" y="670" width="30" height="30" rx="4" fill="#e94560"/>
    <rect x="720" y="630" width="20" height="20" rx="3" fill="#55efc4"/>
  </g>

  <!-- Center circle -->
  <circle cx="400" cy="290" r="170" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Shopping bag / store icon -->
  <g transform="translate(320, 190)" filter="url(#glow)">
    <!-- Bag body -->
    <path d="M20,80 L20,160 C20,168 26,174 34,174 L126,174 C134,174 140,168 140,160 L140,80 Z" fill="rgba(233,69,96,0.15)" stroke="url(#accent)" stroke-width="3"/>
    <!-- Bag handles -->
    <path d="M55,80 L55,50 C55,30 65,20 80,20 C95,20 105,30 105,50 L105,80" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Rhino cube inside bag -->
    <g transform="translate(45, 90)" opacity="0.9">
      <path d="M35,0 L70,20 L70,55 L35,75 L0,55 L0,20 Z" fill="none" stroke="url(#green)" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0,20 L35,40 L70,20" fill="none" stroke="url(#green)" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M35,40 L35,75" fill="none" stroke="url(#green)" stroke-width="2.5"/>
      <circle cx="35" cy="0" r="3" fill="#55efc4"/>
      <circle cx="70" cy="20" r="3" fill="#55efc4"/>
      <circle cx="0" cy="20" r="3" fill="#55efc4"/>
    </g>
    <!-- Minecraft block accent -->
    <rect x="110" y="95" width="18" height="18" rx="2" fill="url(#accent)" opacity="0.6"/>
    <rect x="113" y="98" width="5" height="5" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Brand name -->
  <text x="400" y="500" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="2">
    Chakriya
  </text>
  <text x="400" y="545" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="400" fill="url(#green)" letter-spacing="4">
    DIGITAL STORE
  </text>

  <!-- Tagline -->
  <text x="400" y="595" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)" letter-spacing="1">
    Rhino Plugins • Minecraft Add-ons • Design Tools
  </text>

  <!-- Bottom accent line -->
  <rect x="280" y="640" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- Price tags -->
  <g transform="translate(300, 670)">
    <rect x="0" y="0" width="90" height="32" rx="16" fill="rgba(0,184,148,0.15)" stroke="rgba(85,239,196,0.3)" stroke-width="1"/>
    <text x="45" y="21" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#55efc4">FREE</text>
  </g>
  <g transform="translate(410, 670)">
    <rect x="0" y="0" width="90" height="32" rx="16" fill="rgba(233,69,96,0.15)" stroke="rgba(233,69,96,0.3)" stroke-width="1"/>
    <text x="45" y="21" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ff6b6b">$19-299</text>
  </g>
</svg>
