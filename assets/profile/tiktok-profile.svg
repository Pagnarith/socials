<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="tiktok-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#25f4ee"/>
      <stop offset="100%" style="stop-color:#69f0f0"/>
    </linearGradient>
    <linearGradient id="tiktok-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fe2c55"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="800" fill="url(#grid)"/>
  </g>

  <!-- Decorative pixels -->
  <g opacity="0.15">
    <rect x="60" y="60" width="40" height="40" rx="4" fill="#25f4ee"/>
    <rect x="120" y="100" width="30" height="30" rx="3" fill="#fe2c55"/>
    <rect x="680" y="80" width="35" height="35" rx="4" fill="#25f4ee"/>
    <rect x="620" y="140" width="25" height="25" rx="3" fill="#fe2c55"/>
    <rect x="80" y="640" width="30" height="30" rx="3" fill="#fe2c55"/>
    <rect x="150" y="690" width="25" height="25" rx="3" fill="#25f4ee"/>
    <rect x="650" y="660" width="35" height="35" rx="4" fill="#fe2c55"/>
    <rect x="710" y="620" width="25" height="25" rx="3" fill="#25f4ee"/>
  </g>

  <!-- Center circle -->
  <circle cx="400" cy="320" r="160" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Minecraft pickaxe icon -->
  <g transform="translate(340, 240)" filter="url(#glow)">
    <rect x="50" y="80" width="12" height="80" rx="3" fill="#8B6914" transform="rotate(-45, 56, 120)"/>
    <path d="M30,50 L90,50 L95,30 L85,20 L75,25 L55,25 L45,20 L35,30 Z" fill="url(#tiktok-pink)"/>
    <path d="M45,35 L75,35 L78,28 L72,24 L58,24 L52,28 Z" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- 3D wireframe -->
  <g transform="translate(380, 310)" opacity="0.9" filter="url(#glow)">
    <path d="M0,30 L40,10 L80,30 L40,50 Z" fill="none" stroke="url(#green)" stroke-width="2.5"/>
    <path d="M0,30 L0,60 L40,80 L40,50" fill="none" stroke="url(#green)" stroke-width="2.5"/>
    <path d="M80,30 L80,60 L40,80" fill="none" stroke="url(#green)" stroke-width="2.5"/>
    <circle cx="40" cy="10" r="3" fill="#55efc4"/>
    <circle cx="0" cy="30" r="3" fill="#55efc4"/>
    <circle cx="80" cy="30" r="3" fill="#55efc4"/>
  </g>

  <!-- Brand name -->
  <text x="400" y="480" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="2">
    iPricky
  </text>
  <text x="400" y="520" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="400" fill="url(#green)" letter-spacing="4">
    PAGNARITH
  </text>

  <!-- Tagline -->
  <text x="400" y="570" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)" letter-spacing="1">
    Minecraft Add-ons &amp; Rhino 3D Tutorials
  </text>

  <!-- TikTok music note icon -->
  <g transform="translate(380, 608)" filter="url(#glow)">
    <!-- Cyan offset -->
    <g transform="translate(-3, -2)" opacity="0.7">
      <path d="M18,48 C18,53 13,56 8,56 C3,56 0,53 0,48 C0,43 3,40 8,40 C10,40 12,40.5 14,41.5 L14,0 L28,0 C28,8 34,14 42,15 L42,24 C36,24 30,22 26,18 L26,48 C26,53 22,56 18,56" fill="#25f4ee"/>
    </g>
    <!-- Pink offset -->
    <g transform="translate(3, 2)" opacity="0.7">
      <path d="M18,48 C18,53 13,56 8,56 C3,56 0,53 0,48 C0,43 3,40 8,40 C10,40 12,40.5 14,41.5 L14,0 L28,0 C28,8 34,14 42,15 L42,24 C36,24 30,22 26,18 L26,48 C26,53 22,56 18,56" fill="#fe2c55"/>
    </g>
    <!-- White center -->
    <path d="M18,48 C18,53 13,56 8,56 C3,56 0,53 0,48 C0,43 3,40 8,40 C10,40 12,40.5 14,41.5 L14,0 L28,0 C28,8 34,14 42,15 L42,24 C36,24 30,22 26,18 L26,48 C26,53 22,56 18,56" fill="white"/>
  </g>

  <!-- Bottom accent line (dual TikTok colors) -->
  <rect x="300" y="700" width="100" height="3" rx="1.5" fill="url(#tiktok-cyan)" opacity="0.8"/>
  <rect x="400" y="700" width="100" height="3" rx="1.5" fill="url(#tiktok-pink)" opacity="0.8"/>
</svg>
