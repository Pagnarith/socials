<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e"/>
      <stop offset="100%" style="stop-color:#e17055"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="steam">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="800" fill="url(#grid)"/>
  </g>

  <!-- Decorative pixels -->
  <g opacity="0.12">
    <rect x="60" y="70" width="30" height="30" rx="4" fill="#55efc4"/>
    <rect x="130" y="110" width="22" height="22" rx="3" fill="#e94560"/>
    <rect x="670" y="90" width="28" height="28" rx="4" fill="#55efc4"/>
    <rect x="610" y="50" width="22" height="22" rx="3" fill="#e94560"/>
    <rect x="80" y="660" width="25" height="25" rx="3" fill="#e94560"/>
    <rect x="690" y="660" width="25" height="25" rx="3" fill="#55efc4"/>
  </g>

  <!-- Center circle -->
  <circle cx="400" cy="280" r="170" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Coffee cup icon -->
  <g transform="translate(310, 160)" filter="url(#glow)">
    <!-- Steam lines -->
    <g opacity="0.4" filter="url(#steam)">
      <path d="M65,40 C65,25 75,20 70,5" fill="none" stroke="#fdcb6e" stroke-width="3" stroke-linecap="round"/>
      <path d="M90,45 C90,30 100,22 95,7" fill="none" stroke="#fdcb6e" stroke-width="3" stroke-linecap="round"/>
      <path d="M115,40 C115,25 125,20 120,5" fill="none" stroke="#fdcb6e" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Cup body -->
    <path d="M40,60 L35,180 C35,195 50,205 90,205 C130,205 145,195 145,180 L140,60 Z" fill="rgba(253,203,110,0.15)" stroke="url(#warm)" stroke-width="3"/>
    <!-- Cup handle -->
    <path d="M140,85 C175,85 185,100 185,125 C185,150 175,165 140,165" fill="none" stroke="url(#warm)" stroke-width="3" stroke-linecap="round"/>

    <!-- Heart in coffee -->
    <g transform="translate(60, 95)" opacity="0.8">
      <path d="M30,15 C30,5 20,0 15,0 C5,0 0,10 0,15 C0,30 30,50 30,50 C30,50 60,30 60,15 C60,10 55,0 45,0 C40,0 30,5 30,15 Z" fill="url(#accent)" opacity="0.6"/>
    </g>

    <!-- Cube accent (Rhino 3D) on cup -->
    <g transform="translate(55, 140)" opacity="0.6">
      <path d="M15,0 L30,8 L30,24 L15,32 L0,24 L0,8 Z" fill="none" stroke="url(#green)" stroke-width="1.5"/>
      <path d="M0,8 L15,16 L30,8" fill="none" stroke="url(#green)" stroke-width="1.5"/>
      <path d="M15,16 L15,32" fill="none" stroke="url(#green)" stroke-width="1.5"/>
    </g>

    <!-- Minecraft block on saucer -->
    <rect x="120" y="185" width="16" height="16" rx="2" fill="url(#green)" opacity="0.5"/>
    <rect x="123" y="188" width="4" height="4" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Brand name -->
  <text x="400" y="490" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="2">
    Chakriya
  </text>
  <text x="400" y="535" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="400" fill="url(#warm)" letter-spacing="3">
    SUPPORT US
  </text>

  <!-- Tagline -->
  <text x="400" y="585" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)" letter-spacing="1">
    Free Add-ons &amp; Tutorials — Powered by You
  </text>

  <!-- Bottom accent line -->
  <rect x="280" y="630" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- Support badge -->
  <g transform="translate(325, 660)">
    <rect x="0" y="0" width="150" height="36" rx="18" fill="rgba(253,203,110,0.1)" stroke="rgba(253,203,110,0.25)" stroke-width="1"/>
    <text x="75" y="24" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(253,203,110,0.8)">☕ Buy a Coffee</text>
  </g>
</svg>
