<svg xmlns="http://www.w3.org/2000/svg" width="820" height="312" viewBox="0 0 820 312">
  <!--
    Facebook Cover Photo
    Recommended: 820 x 312 px
    Displays at 820 x 312 on desktop, 640 x 360 on mobile
    Safe area: center ~620 x 250
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="40%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1877f2"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <linearGradient id="greenH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="312" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="none" stroke="#fff" stroke-width="0.4"/>
    </pattern>
    <rect width="820" height="312" fill="url(#grid)"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="200" cy="156" r="180" fill="#1877f2" opacity="0.04"/>
  <circle cx="620" cy="156" r="180" fill="#55efc4" opacity="0.03"/>

  <!-- Scattered Minecraft blocks -->
  <g opacity="0.12">
    <rect x="30" y="30" width="20" height="20" rx="3" fill="#55efc4"/>
    <rect x="70" y="60" width="14" height="14" rx="2" fill="#1877f2"/>
    <rect x="740" y="40" width="18" height="18" rx="2" fill="#55efc4"/>
    <rect x="770" y="260" width="16" height="16" rx="2" fill="#1877f2"/>
    <rect x="30" y="250" width="16" height="16" rx="2" fill="#1877f2"/>
    <rect x="700" y="70" width="12" height="12" rx="2" fill="#1877f2" opacity="0.6"/>
  </g>

  <!-- Left: Minecraft Pickaxe -->
  <g transform="translate(130, 100)" filter="url(#glow)">
    <rect x="35" y="55" width="10" height="65" rx="3" fill="#8B6914" transform="rotate(-45, 40, 88)"/>
    <path d="M15,35 L75,35 L80,20 L72,12 L60,16 L30,16 L18,12 L10,20 Z" fill="url(#blue)"/>
    <path d="M28,22 L62,22 L66,16 L60,12 L50,14 L40,14 L30,12 L24,16 Z" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Center: Brand Text -->
  <text x="410" y="138" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="2">
    iPricky Pagnarith
  </text>

  <!-- Subtitle -->
  <text x="410" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="400" fill="url(#greenH)" letter-spacing="5" opacity="0.9">
    MINECRAFT ADD-ONS &amp; RHINO 3D TUTORIALS
  </text>

  <!-- Bottom pills -->
  <g transform="translate(410, 218)" text-anchor="middle">
    <g transform="translate(-140, 0)">
      <rect x="-60" y="-14" width="120" height="26" rx="13" fill="rgba(24,119,242,0.15)" stroke="#1877f2" stroke-width="1" opacity="0.7"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#42a5f5" letter-spacing="1.5">🎮 MINECRAFT</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-55" y="-14" width="110" height="26" rx="13" fill="rgba(0,184,148,0.1)" stroke="#00b894" stroke-width="1" opacity="0.7"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#55efc4" letter-spacing="1.5">🏗️ RHINO 3D</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="-60" y="-14" width="120" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1" opacity="0.7"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="1.5">📺 TUTORIALS</text>
    </g>
  </g>

  <!-- Right: 3D wireframe cube -->
  <g transform="translate(600, 95)" filter="url(#glow)" opacity="0.8">
    <path d="M0,35 L45,15 L90,35 L45,55 Z" fill="none" stroke="url(#green)" stroke-width="2"/>
    <path d="M0,35 L0,70 L45,90 L45,55" fill="none" stroke="url(#green)" stroke-width="2"/>
    <path d="M90,35 L90,70 L45,90" fill="none" stroke="url(#green)" stroke-width="2"/>
    <circle cx="45" cy="15" r="3" fill="#55efc4"/>
    <circle cx="0" cy="35" r="2.5" fill="#55efc4"/>
    <circle cx="90" cy="35" r="2.5" fill="#55efc4"/>
    <circle cx="45" cy="90" r="2.5" fill="#55efc4" opacity="0.6"/>
  </g>

  <!-- Website URL bottom -->
  <text x="410" y="275" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="2">
    social.chakriya.net
  </text>

  <!-- Top/bottom subtle accent lines -->
  <rect x="210" y="60" width="400" height="1" rx="0.5" fill="url(#blue)" opacity="0.2"/>
  <rect x="210" y="292" width="400" height="1" rx="0.5" fill="url(#blue)" opacity="0.2"/>
</svg>
