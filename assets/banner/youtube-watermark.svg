<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <!--
    YouTube Video Watermark / Branding Watermark
    Size: 150 x 150 px (YouTube recommended)
    Appears in bottom-right of videos when viewer hovers
    Should be simple, recognizable, semi-transparent friendly
  -->
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
  </defs>

  <!-- Transparent background (YouTube overlays this on video) -->

  <!-- Outer circle -->
  <circle cx="75" cy="75" r="72" fill="rgba(26,26,46,0.85)" stroke="url(#accent)" stroke-width="2.5"/>

  <!-- Inner ring -->
  <circle cx="75" cy="75" r="60" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Minecraft pickaxe (simplified, small) -->
  <g transform="translate(47, 28)">
    <!-- Pickaxe head -->
    <path d="M10,22 L46,22 L50,12 L44,6 L36,10 L20,10 L12,6 L6,12 Z" fill="url(#accent)"/>
    <path d="M18,14 L38,14 L40,10 L36,8 L20,8 L16,10 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Handle -->
    <rect x="24" y="28" width="8" height="32" rx="2" fill="#8B6914" transform="rotate(-45, 28, 44)"/>
  </g>

  <!-- Brand initial "iP" -->
  <text x="75" y="105" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="1">
    iP
  </text>

  <!-- Small subscribe arrow hint -->
  <text x="75" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="url(#green)" letter-spacing="1.5" opacity="0.8">
    SUBSCRIBE
  </text>
</svg>
