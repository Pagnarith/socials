<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>socials webhook</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f172a, #111827 55%, #1e293b);
        color: #e5e7eb;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(680px, calc(100vw - 48px));
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 4vw, 42px);
      }
      p {
        line-height: 1.6;
        color: #cbd5e1;
      }
      code {
        color: #f8fafc;
        background: rgba(30, 41, 59, 0.8);
        padding: 2px 8px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Telegram Bot Webhook</h1>
      <p>This Vercel project hosts the Telegram webhook endpoint for the socials automation bot.</p>
      <p>Webhook path: <code>/api/telegram-webhook</code></p>
    </main>
  </body>
</html>
